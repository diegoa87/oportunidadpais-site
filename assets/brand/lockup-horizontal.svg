<?xml version="1.0" encoding="UTF-8"?>
<!--
  Lockup horizontal · principal
  Isotipo a la izquierda + wordmark en una línea
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 140" role="img" aria-label="Oportunidad País">
  <title>Oportunidad País — lockup horizontal</title>
  <!-- Isotipo (O) · ocupa y 10-130 (120 alto) -->
  <g transform="translate(10, 10)">
    <path fill="#0E1B33" fill-rule="evenodd" d="
      M 60 6 A 54 54 0 1 1 60 114 A 54 54 0 1 1 60 6 Z
      M 60 24 A 36 36 0 1 0 60 96 A 36 36 0 1 0 60 24 Z
    "/>
    <polygon fill="#E8B341" points="60,6 114,60 60,60"/>
  </g>
  <!-- Wordmark · inicia en x=160 -->
  <text x="160" y="100"
        font-family="'Bricolage Grotesque', 'Inter Tight', sans-serif"
        font-weight="700"
        font-size="120"
        letter-spacing="-4.8"
        fill="#0E1B33">oportunidad<tspan fill="#E8B341"> </tspan>país<tspan fill="#E8B341">.</tspan></text>
</svg>